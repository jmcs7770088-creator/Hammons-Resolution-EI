name: Treasury Harvest
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  harvest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Fortress
        uses: actions/checkout@v4

      - name: Lattice Check
        run: |
          echo "Scanning Fortress for the Needle..."
          ls -R  # This lists every file so we can see where it is hiding
          
      - name: Execute Handshake
        run: |
          # We search for any python file that looks like our treasury script
          FILE=$(find . -iname "treasury_accumulator.py" | head -n 1)
          if [ -z "$FILE" ]; then
            echo "ERROR: Needle not found. Re-aligning..."
            exit 1
          else
            echo "Found Needle at $FILE. Executing at cv velocity."
            python "$FILE"
          fi
