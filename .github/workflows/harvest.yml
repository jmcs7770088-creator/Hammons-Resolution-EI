name: Treasury Harvest
on:
  workflow_dispatch: # This creates the "Run" button

jobs:
  harvest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Fortress
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Run Treasury Script
        run: python automation/treasury_accumulator.py
